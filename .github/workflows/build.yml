name: Build & Release App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app
        run: npm run build -- --publish never

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Pomodoro-Buddy-*.dmg
            dist/Pomodoro-Buddy-*.zip
            dist/Pomodoro-Buddy-*.exe
          body: |
            ## 🚀 Latest Version
            
            Enjoy your Pomodoro Buddy on both macOS and Windows!
            
            ### 💻 Windows
            - **`Pomodoro-Buddy-Setup-[version]-win.exe`**: Standard Windows installer.
            - **`Pomodoro-Buddy-[version]-win.exe`**: Portable version (no installation required).
            
            ### 🍎 macOS
            - **`Pomodoro-Buddy-[version]-mac.dmg`**: Mac installer. Drag the app into your Applications folder.
            - **`Pomodoro-Buddy-[version]-mac.zip`**: Standard zipped app.
            
            *Note for Mac Users:* This release is an `x64` build that prevents the macOS Gatekeeper "damaged app" error affecting unsigned Apple Silicon apps. It works perfectly on Apple Silicon via Rosetta 2. If macOS says the app is from an *unidentified developer*, simply **Right-Click -> Open** the app format.
            
            ---
            **Changelog:**
            - Cleaned up default release assets by removing duplicate/unnecessary blockmap files.
            - Standardized executable names for a clean downloading experience.
            - Updated release note guides.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
