appId: com.pomodoro.buddy
productName: Pomodoro Buddy
artifactName: "Pomodoro-Buddy-${version}-${os}.${ext}"
directories:
  output: dist
compression: maximum
files:
  - index.html
  - style.css
  - main.js
  - renderer.js
  - icon.png
  - trayTemplate.png
  - trayTemplate@2x.png
  - package.json
mac:
  category: public.app-category.productivity
  identity: null
  target:
    - target: dmg
      arch:
        - x64
    - target: zip
      arch:
        - x64
  icon: icon.png
dmg:
  writeUpdateInfo: false
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
win:
  target:
    - target: nsis
    - target: portable
  icon: icon.png
nsis:
  artifactName: "Pomodoro-Buddy-Setup-${version}-${os}.${ext}"
  oneClick: false
  allowToChangeInstallationDirectory: true
