appId: com.pomodoro.buddy
productName: Pomodoro Buddy
directories:
  output: dist
compression: maximum
files:
  - index.html
  - style.css
  - main.js
  - renderer.js
  - icon.png
  - package.json
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
  icon: icon.png
dmg:
  artifactName: "Pomodoro-Buddy-${version}-${arch}.${ext}"
  writeUpdateInfo: false
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
