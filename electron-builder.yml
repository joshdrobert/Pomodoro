appId: com.pomodoro.buddy
productName: Pomodoro Buddy
directories:
  output: dist
  buildResources: assets

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
  icon: icon.png
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

dmg:
  artifactName: "Pomodoro-Buddy-${version}-Standard-arm64.${ext}"
  backgroundColor: "#ffffff"
  window:
    width: 540
    height: 380
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file
  writeUpdateInfo: false

files:
  - build/**/*
  - src/**/*
  - main.js
  - icon.png
  - package.json

compression: maximum
asar: true
