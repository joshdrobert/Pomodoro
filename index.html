<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pomodoro Buddy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="buddy-container" class="draggable">
        <div id="buddy" class="idle buddy-fruit">
            <!-- Fruit character -->
            <div class="fruit-parts">
                <div class="tomato-highlight"></div>
                <div class="calyx">
                    <div class="sepal"></div>
                    <div class="sepal"></div>
                    <div class="sepal"></div>
                    <div class="sepal"></div>
                    <div class="sepal"></div>
                </div>
                <div class="stem"></div>
            </div>
            <!-- Cat character -->
            <div class="cat-parts">
                <div class="cat-ear left-ear"></div>
                <div class="cat-ear right-ear"></div>
                <div class="whiskers">
                    <div class="whisker-set left-whiskers">
                        <div class="whisker"></div>
                        <div class="whisker"></div>
                        <div class="whisker"></div>
                    </div>
                    <div class="whisker-set right-whiskers">
                        <div class="whisker"></div>
                        <div class="whisker"></div>
                        <div class="whisker"></div>
                    </div>
                </div>
                <div class="cat-tail"></div>
                <div class="cat-paws">
                    <div class="paw left-paw"></div>
                    <div class="paw right-paw"></div>
                </div>
            </div>
            <!-- Shared face -->
            <div class="face">
                <div class="eyes">
                    <div class="eye left"></div>
                    <div class="eye right"></div>
                </div>
                <div class="nose"></div>
                <div class="blush"></div>
                <div class="mouth"></div>
            </div>
            <div class="body"></div>
            <div class="timer-display" id="timer">25:00</div>
        </div>
        
        <div class="controls">
            <button id="start-btn">Start</button>
            <button id="reset-btn">Reset</button>
            <button id="char-btn" title="Switch character">🍅</button>
            <div class="settings">
                <input type="number" id="work-time" value="25" min="1" max="60">
                <input type="number" id="break-time" value="5" min="1" max="60">
            </div>
        </div>
        <button id="quit-btn" title="Quit Pomodoro Buddy">✕</button>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
